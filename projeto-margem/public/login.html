<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Supervendas · Login</title>
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#1f6b35">
<link rel="apple-touch-icon" href="/icon-192.png">
<script src="/pwa.js"></script>
<script src="theme.js"></script>
<link rel="stylesheet" href="style.css">
<style>
  body { margin: 0; min-height: 100vh; }
  .login-split { display: grid; grid-template-columns: 1fr 1fr; min-height: 100vh; }

  /* ===== LADO ESQUERDO — formulário ===== */
  .login-left {
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
    background: var(--bg);
  }
  .login-card {
    width: 100%; max-width: 420px;
    background: var(--bg-elev-3);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 36px 36px 28px;
    box-shadow: var(--shadow-card);
  }
  .login-brand {
    display: flex; align-items: center; gap: 12px; margin-bottom: 28px;
  }
  .login-brand .brand-mark {
    width: 56px; height: 56px;
    background: var(--accent);
    border: 3px solid var(--accent-2);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    color: var(--accent-2); font-weight: 800; font-size: 22px;
    font-style: italic; letter-spacing: -1px;
    box-shadow: 0 3px 10px rgba(31, 107, 53, .3);
  }
  .login-brand .brand-text { display: flex; flex-direction: column; line-height: 1.2; }
  .login-brand .brand-name { color: var(--text); font-weight: 800; font-size: 20px; font-style: italic; letter-spacing: -.3px; }
  .login-brand .brand-tag { color: var(--accent-2); font-size: 11px; font-weight: 700; margin-top: 3px; letter-spacing: 1px; text-transform: uppercase; }

  .login-card label {
    display: block; color: var(--text); font-size: 13px;
    margin: 14px 0 6px; font-weight: 500;
  }
  .login-card label::after { content: '*'; color: var(--accent-2); margin-left: 2px; }
  .login-card input {
    width: 100%; background: var(--bg-input); color: var(--text);
    border: 1px solid var(--border-2); padding: 11px 14px;
    border-radius: 8px; font-size: 14px;
    transition: border .15s;
  }
  .login-card input:focus { border-color: var(--accent); outline: none; }
  .password-wrap { position: relative; }
  .password-wrap .toggle-pwd {
    position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
    background: transparent; border: none; cursor: pointer;
    color: var(--text-muted); font-size: 16px; padding: 4px 8px;
  }
  .password-wrap .toggle-pwd:hover { color: var(--text); }

  .forgot {
    display: block; text-align: center; margin-top: 16px;
    color: var(--accent); font-size: 13px; text-decoration: none; cursor: pointer;
    font-weight: 500;
  }
  .forgot:hover { text-decoration: underline; }

  .login-card button.submit {
    width: 100%; margin-top: 18px;
    background: linear-gradient(180deg, var(--accent) 0%, var(--accent-strong) 100%);
    color: white; border: none;
    padding: 14px; border-radius: 8px;
    font-size: 15px; font-weight: 700; cursor: pointer;
    box-shadow: 0 3px 10px rgba(31, 107, 53, .3);
    transition: filter .15s, transform .05s;
  }
  .login-card button.submit:hover { filter: brightness(1.1); }
  .login-card button.submit:active { transform: translateY(1px); }
  .login-card button.submit:disabled { opacity: .55; cursor: not-allowed; }

  .support {
    display: block; text-align: center; margin-top: 20px;
    color: var(--text-muted); font-size: 13px; text-decoration: none; cursor: pointer;
  }
  .support:hover { color: var(--text); }

  .err { color: var(--neg); font-size: 13px; margin-top: 12px; min-height: 18px; text-align: center; }

  /* ===== LADO DIREITO — banner com logo Supervendas ===== */
  .login-right {
    background: linear-gradient(135deg, #0c2a18 0%, #144024 50%, #1a4f2c 100%);
    color: #fff;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 60px 40px;
    position: relative; overflow: hidden;
  }
  .login-right::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(circle at 30% 20%, rgba(245, 211, 12, .15), transparent 50%),
                radial-gradient(circle at 70% 80%, rgba(42, 138, 69, .25), transparent 50%);
    pointer-events: none;
  }

  /* Logo SUPERVENDAS recriada via HTML/CSS */
  .sv-hero { position: relative; z-index: 1; max-width: 540px; text-align: center; }
  .sv-logo {
    display: inline-flex; align-items: center; gap: 18px;
    margin-bottom: 32px;
  }
  .sv-logo-mark {
    width: 110px; height: 110px;
    background: #1d6633;
    border: 5px solid #f5d30c;
    border-radius: 22px;
    display: flex; align-items: center; justify-content: center;
    color: #f5d30c; font-weight: 900; font-size: 56px;
    font-style: italic; letter-spacing: -3px;
    box-shadow: 0 6px 24px rgba(0, 0, 0, .35);
    transform: rotate(-3deg);
  }
  .sv-logo-text { text-align: left; }
  .sv-logo-name {
    color: #f5d30c;
    font-size: 56px; font-weight: 900; font-style: italic;
    letter-spacing: -1.5px;
    line-height: 1;
    -webkit-text-stroke: 1.5px #1d6633;
    text-shadow: 3px 3px 0 #1d6633;
  }
  .sv-logo-sub {
    margin-top: 8px;
    background: #1d6633;
    color: #fff;
    border-radius: 999px;
    padding: 6px 16px;
    font-size: 13px; font-weight: 700; letter-spacing: 2.5px;
    display: inline-block;
  }

  .right-content h2 {
    font-size: 26px; line-height: 1.3; margin: 32px 0 12px;
    font-weight: 700; letter-spacing: -.2px; color: #fff;
  }
  .right-content .highlight { color: #f5d30c; }
  .right-content p.tagline {
    font-size: 16px; margin: 0 0 30px;
    color: #c8d8c8; font-weight: 500;
  }

  /* mockup com 3 cards de KPI */
  .mock-cards { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin: 24px 0; }
  .mock-card {
    background: rgba(255,255,255,.06);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(245, 211, 12, .25);
    border-radius: 10px;
    padding: 14px;
    text-align: left;
  }
  .mock-card .mc-label { color: #a8c4a8; font-size: 10px; text-transform: uppercase; letter-spacing: .5px; }
  .mock-card .mc-value { color: #fff; font-size: 18px; font-weight: 700; margin-top: 6px; font-variant-numeric: tabular-nums; }
  .mock-card .mc-delta { font-size: 11px; margin-top: 4px; font-weight: 600; }
  .mock-card .mc-delta.up { color: #6ee7a3; }
  .mock-card .mc-delta.down { color: #ff9aa2; }

  .right-content .footer-note {
    margin-top: 24px; color: #8eb098; font-size: 13px;
  }

  .theme-corner { position: fixed; top: 16px; right: 16px; z-index: 5; }

  /* responsivo */
  @media (max-width: 980px) {
    .login-split { grid-template-columns: 1fr; }
    .login-right { display: none; }
    .login-left { padding: 40px 16px; }
  }
  @media (max-width: 540px) {
    .sv-logo-name { font-size: 44px; }
    .sv-logo-mark { width: 88px; height: 88px; font-size: 44px; }
  }
</style>
<link rel="stylesheet" href="mobile.css">
</head>
<body>
<button class="btn-theme theme-corner" title="Trocar tema">☀️</button>

<div class="login-split">
  <div class="login-left">
    <div class="login-card">
      <div class="login-brand">
        <div class="brand-mark">SV</div>
        <div class="brand-text">
          <div class="brand-name">Supervendas</div>
          <div class="brand-tag">Kpi's Comercial</div>
        </div>
      </div>

      <form id="loginForm">
        <label for="username">Login</label>
        <input id="username" name="username" type="text" autocomplete="username" required autofocus placeholder="seu usuário">

        <label for="password">Senha</label>
        <div class="password-wrap">
          <input id="password" name="password" type="password" autocomplete="current-password" required placeholder="••••••••">
          <button type="button" class="toggle-pwd" id="togglePwd" title="Mostrar/ocultar senha">👁</button>
        </div>

        <a class="forgot" id="forgotLink">Esqueci a senha</a>

        <button type="submit" id="btnSubmit" class="submit">Entrar</button>

        <div class="err" id="err"></div>
      </form>

      <a class="support" id="supportLink">Suporte</a>
    </div>
  </div>

  <div class="login-right">
    <div class="sv-hero">
      <div class="sv-logo">
        <div class="sv-logo-mark">SV</div>
        <div class="sv-logo-text">
          <div class="sv-logo-name">SUPERVENDAS</div>
          <div class="sv-logo-sub">SUPERMERCADOS</div>
        </div>
      </div>

      <h2>Plataforma de <span class="highlight">inteligência comercial</span></h2>

      <p class="footer-note">Em qualquer lugar, a qualquer hora.</p>
    </div>
  </div>
</div>

<script src="login.js"></script>
<script>
  document.getElementById('togglePwd').addEventListener('click', () => {
    const inp = document.getElementById('password');
    inp.type = inp.type === 'password' ? 'text' : 'password';
  });
  document.getElementById('forgotLink').addEventListener('click', (e) => {
    e.preventDefault();
    alert('Pra redefinir sua senha, peça pro admin (joao paiva) no painel admin.');
  });
  document.getElementById('supportLink').addEventListener('click', (e) => {
    e.preventDefault();
    alert('Suporte: tongadamilongamaster@gmail.com');
  });
</script>
</body>
</html>
