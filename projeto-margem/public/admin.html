<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Margem · Admin</title>
<link rel="stylesheet" href="style.css">
<style>
  .container { max-width: 880px; margin: 24px auto; padding: 0 16px; }
  .card { background: #161a23; border: 1px solid #232938; border-radius: 8px; padding: 20px; margin-bottom: 18px; }
  .card h2 { margin: 0 0 14px; font-size: 15px; color: #c5cad4; text-transform: uppercase; letter-spacing: .5px; }
  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .row input, .row select, .row button {
    background: #0f131c; color: #e6e8eb; border: 1px solid #2c3346; padding: 8px 12px; border-radius: 6px; font-size: 13px;
  }
  .row button { background: #1f2533; cursor: pointer; }
  .row button:hover { background: #283047; }
  .row button.primary { background: #3b6dab; border-color: #3b6dab; }
  .row button.primary:hover { background: #4a7dbb; }
  .row button.danger { color: #ffb3bf; border-color: #5b2734; }
  .row button.danger:hover { background: #3b1d27; }
  table { width: 100%; border-collapse: collapse; margin-top: 8px; }
  th, td { padding: 8px 10px; text-align: left; border-bottom: 1px solid #1c2230; font-size: 13px; }
  th { color: #8b95a7; font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: .4px; }
  .badge { background: #2a4868; color: #b8d4e6; padding: 2px 8px; border-radius: 4px; font-size: 11px; }
  .actions-cell { display: flex; gap: 6px; }
  .err { color: #f87171; margin-top: 10px; min-height: 18px; }
  .ok  { color: #4ade80; margin-top: 10px; min-height: 18px; }
</style>
</head>
<body>
<header class="topbar">
  <div class="brand">
    <h1>Margem · Admin</h1>
    <div class="sub">Gerenciamento de usuários</div>
  </div>
  <div class="actions">
    <a href="/" style="color:#b8d4e6;text-decoration:none;font-size:12px;padding:6px 12px;border:1px solid #2c3346;border-radius:6px;">← Voltar ao app</a>
    <button id="btnLogout">Sair</button>
  </div>
</header>

<div class="container">
  <div class="card">
    <h2>Criar novo usuário</h2>
    <form id="formCreate" class="row">
      <input id="newUsername" type="text" placeholder="nome de usuário" required>
      <input id="newPassword" type="text" placeholder="senha (mín. 6)" required>
      <label class="row" style="gap:6px"><input id="newAdmin" type="checkbox"> admin</label>
      <button type="submit" class="primary">Criar</button>
    </form>
    <div class="err" id="errCreate"></div>
    <div class="ok" id="okCreate"></div>
  </div>

  <div class="card">
    <h2>Usuários</h2>
    <table>
      <thead>
        <tr>
          <th>Usuário</th>
          <th>Tipo</th>
          <th>Criado em</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="usersTbody"></tbody>
    </table>
  </div>

  <div class="card">
    <h2>Trocar minha senha</h2>
    <form id="formMyPwd" class="row">
      <input id="curPwd" type="password" placeholder="senha atual" required>
      <input id="newPwd" type="password" placeholder="senha nova (mín. 6)" required>
      <button type="submit" class="primary">Trocar</button>
    </form>
    <div class="err" id="errPwd"></div>
    <div class="ok" id="okPwd"></div>
  </div>
</div>

<script src="admin.js"></script>
</body>
</html>
