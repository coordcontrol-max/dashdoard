<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Supervendas · DRE PowerBI</title>
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#1f6b35">
<link rel="apple-touch-icon" href="/icon-192.png">
<script src="/pwa.js"></script>
<script src="theme.js"></script>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="mobile.css">
<style>
  .dre-frame-wrap { flex: 1; min-height: 0; display: flex; background: var(--bg); }
  .dre-frame-wrap iframe {
    flex: 1; width: 100%; min-height: 0;
    border: 0; display: block;
    background: var(--bg);
  }
</style>
</head>
<body>
<header class="topbar">
  <div class="brand">
    <h1>DRE PowerBI</h1>
    <div class="sub">Relatório operacional consolidado</div>
  </div>
  <div class="actions">
    <span id="userInfo" class="user-info"></span>
    <a id="linkAdmin" href="/admin" style="display:none;color:var(--text-link);text-decoration:none;font-size:12px;padding:6px 12px;border:1px solid var(--border-2);border-radius:6px;">Admin</a>
    <button class="btn-fullscreen" title="Tela cheia"></button>
    <button class="btn-theme" title="Trocar tema">☀️</button>
    <button id="btnLogout">Sair</button>
  </div>
</header>
<script src="fullscreen.js"></script>

<div class="layout">
<aside class="sidebar"></aside>
<div class="main-content">
  <div class="dre-frame-wrap">
    <iframe id="drePbFrame"
            title="DRE PowerBI"
            src="https://app.powerbi.com/reportEmbed?reportId=65e1ecc1-2da3-49ff-95d4-da29ed21c4e3&autoAuth=true&ctid=77e97564-703e-4dda-9606-23389e1501a6"
            allowfullscreen
            referrerpolicy="strict-origin-when-cross-origin"></iframe>
  </div>
</div>
</div>

<script src="sidebar.js"></script>
<script>
  (async () => {
    try {
      const r = await fetch('/api/me');
      if (!r.ok) { location.href = '/login.html'; return; }
      const me = await r.json();
      document.getElementById('userInfo').textContent = me.username + (me.is_admin ? ' (admin)' : '');
      if (me.is_admin) document.getElementById('linkAdmin').style.display = '';
    } catch { location.href = '/login.html'; }
  })();

  document.getElementById('btnLogout').addEventListener('click', async () => {
    try { await fetch('/api/logout', { method: 'POST' }); } catch {}
    location.href = '/login.html';
  });
</script>
</body>
</html>
