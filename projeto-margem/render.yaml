# Configuração do Render (opcional — também pode configurar tudo pelo dashboard).
services:
  - type: web
    name: margem-paiva
    runtime: node
    plan: free
    region: ohio
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true   # Render gera um aleatório no 1º deploy
      - key: ADMIN_USERNAME
        value: "joao paiva"
      - key: ADMIN_PASSWORD
        sync: false            # você define no dashboard
      - key: DATABASE_URL
        fromDatabase:
          name: margem-db
          property: connectionString
